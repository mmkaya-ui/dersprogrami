    <script>
    (function () {
        'use strict';

        // -------- AYARLAR & SABİTLER --------
        const CONFIG = {
            // YENİ CSV LİNKİ
            csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR-t6FwWuwU-JOYcDVEbLdkXT7R8cuvcuz9IPuOY78MPWM44MesHJKBHyI8ZVOehuh5yvv99yI2jLd/pub?gid=942881775&single=true&output=csv',
            
            classes: {
                hidden: 'hidden',
                rotate: 'rotate-icon',
                dark: 'dark',
                menuIn: ['scale-100', 'opacity-100'],
                menuOut: ['scale-95', 'opacity-0'],
                btnPrimary: ['bg-emerald-50', 'dark:bg-emerald-900/40', 'text-emerald-700', 'dark:text-emerald-400', 'hover:bg-emerald-100', 'dark:hover:bg-emerald-900/60'],
                btnSecondary: ['bg-amber-50', 'dark:bg-amber-900/30', 'text-amber-700', 'dark:text-amber-400', 'hover:bg-amber-100', 'dark:hover:bg-amber-900/50']
            },
            
            // Ay İsimleri (Küçük harf ve normalize edilmiş)
            months: { 
                'ocak':0, 'subat':1, 'mart':2, 'nisan':3, 'mayis':4, 'haziran':5, 
                'temmuz':6, 'agustos':7, 'eylul':8, 'ekim':9, 'kasim':10, 'aralik':11 
            },
            
            searchDebounce: 250,
            
            // KATIL BUTONU TOLERANSI (DAKİKA) - 2 Saat
            joinToleranceMinutes: 120 
        };

        // -------- SABİT KAYNAKLAR --------
        const EXTRA_RESOURCES = [
            { name: "Harf telaffuzu", url: "https://drive.google.com/file/d/1DLRV_JpC575qT6psdeiL9eI8VHE8usWw/view?usp=drive_link" },
            { name: "Kur'an Dersi 1", url: "https://drive.google.com/file/d/1-B8LH40llBzn27A3sBQQSBP-dI7P_sWO/view?usp=drive_link" },
            { name: "Kur'an Dersi 2", url: "https://drive.google.com/file/d/1djd_lLS8PyqmP-_5hjfkGR2jDm7dbRCp/view?usp=drive_link" },
            { name: "Kur'an Dersi 3", url: "https://drive.google.com/file/d/10YQXMUTkcMyWww5qFm6uKjtoreGaPGwI/view?usp=drive_link" },
            { name: "Kur'an Dersi 4", url: "https://drive.google.com/file/d/1shMgMEn30NPCrEHbgq0UWqZz21KDsmWI/view?usp=drive_link" },
            { name: "Kur'an Dersi 5", url: "https://drive.google.com/file/d/1DToY7jOE2OnyLQKhCs0s2WYLrN6AkTE8/view?usp=drive_link" },
            { name: "Kur'an Dersi 6", url: "https://drive.google.com/file/d/1RgscC_0-riGl4Ocjt46xKljns1MVeAVI/view?usp=drive_link" },
            { name: "Kur'an Dersi 7", url: "https://drive.google.com/file/d/1tT7208haWxluGZClorbA_KEL9q7CJKWC/view?usp=drive_link" },
            { name: "Kur'an Dersi 17", url: "https://drive.google.com/file/d/1IF52k3Yj-2mCdvomJ_Yml7Pe6d8au5Ps/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 1", url: "https://drive.google.com/file/d/1qiy60bnYz22o18KpV7UPotZhPqvNbZ2H/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 2", url: "https://drive.google.com/file/d/19BR6RSEGndxEAoyqiIKeEBRtmv5StuG3/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 3", url: "https://drive.google.com/file/d/1FAwK7eYkDEwJmdDL7aBHCvKxH-cLAMQw/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 4", url: "https://drive.google.com/file/d/1RSqFv2Wy16pmM4p4kxPFw3FYuLvNaJTg/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 5", url: "https://drive.google.com/file/d/18Z8L6uLyV5do0GZaiODcdVSbuBVRiFYw/view?usp=drive_link" }
        ];

        // -------- YARDIMCI FONKSİYONLAR --------
        function normalizeText(value) {
            if (!value) return '';
            let v = String(value);
            try { v = v.toLocaleLowerCase('tr'); } catch (e) { v = v.toLowerCase(); }
            // Türkçe karakterleri temizle
            v = v.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            v = v.replace(/ı/g, 'i').replace(/İ/g, 'i');
            return v;
        }

        const DateProcessor = {
            parseTimestamp(dateStr, timeStr) {
                try {
                    const normDate = normalizeText(dateStr);
                    const normTime = timeStr ? timeStr.trim() : "00:00";
                    
                    // Günü bul
                    const dayMatch = normDate.match(/(\d+)/);
                    if (!dayMatch) return 0;
                    const day = parseInt(dayMatch[1]);

                    // Ayı bul
                    let monthIndex = -1;
                    for (const [key, val] of Object.entries(CONFIG.months)) {
                        if (normDate.includes(key) || normDate.includes(key.substring(0, 3))) {
                            monthIndex = val;
                            break;
                        }
                    }
                    if (monthIndex === -1) return 0;

                    // Saati ayrıştır
                    const [hour, minute] = normTime.split(':').map(n => parseInt(n) || 0);

                    // Yıl Tahmini
                    const now = new Date();
                    let year = now.getFullYear();
                    const currentMonth = now.getMonth();

                    // Yıl geçiş kontrolü
                    if (currentMonth > 8 && monthIndex < 3) {
                        year += 1;
                    } else if (currentMonth < 3 && monthIndex > 8) {
                        year -= 1;
                    }

                    return new Date(year, monthIndex, day, hour, minute).getTime();
                } catch (e) {
                    return 0;
                }
            }
        };

        function parseCSV(text) {
            const rows = [];
            const lines = text.trim().split(/\r?\n/).slice(1);
            lines.forEach(line => {
                const cols = [];
                let current = '';
                let inQuote = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') { inQuote = !inQuote; }
                    else if (char === ',' && !inQuote) { cols.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                cols.push(current.trim());
                rows.push(cols);
            });
            return rows;
        }

        // -------- DATA SERVICE --------
        class DataService {
            #processedSchedule = [];
            #processedResources = [];

            constructor() {
                this.#processedResources = EXTRA_RESOURCES;
            }

            async loadData() {
                try {
                    const response = await fetch(CONFIG.csvUrl);
                    if (!response.ok) throw new Error('Veri çekilemedi');
                    
                    // KARAKTER KODLAMA DÜZELTME (UTF-8 DECODER)
                    // ? işareti sorununu çözmek için en güvenli modern yöntem
                    const buffer = await response.arrayBuffer();
                    const decoder = new TextDecoder('utf-8'); 
                    const csvText = decoder.decode(buffer);
                    
                    const rows = parseCSV(csvText);
                    
                    this.#processedSchedule = rows.map(cols => {
                        const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : '';
                        
                        const item = {
                            week: clean(cols[0]),
                            date: clean(cols[1]),
                            day: clean(cols[2]),
                            time: clean(cols[3]),
                            subject: clean(cols[4]),
                            speaker: clean(cols[5]),
                            link1: clean(cols[6]),
                            link2: clean(cols[7])
                        };

                        return {
                            ...item,
                            timestamp: DateProcessor.parseTimestamp(item.date, item.time),
                            searchIndex: normalizeText(`${item.subject} ${item.speaker} ${item.date} ${item.day}`)
                        };
                    }).filter(item => item.subject); 

                    return true;
                } catch (error) {
                    console.error("Veri yükleme hatası:", error);
                    return false;
                }
            }

            get groupedSchedule() {
                return this.#processedSchedule.reduce((acc, item) => {
                    (acc[item.week] = acc[item.week] || []).push(item);
                    return acc;
                }, {});
            }

            get resources() { return this.#processedResources; }

            search(query) {
                if (!query) return null;
                const normalizedQuery = normalizeText(query);
                return this.#processedSchedule.filter(item => item.searchIndex.includes(normalizedQuery));
            }
        }

        class ThemeManager {
            #html; #icon; #btn;
            constructor() {
                this.#html = document.documentElement;
                this.#icon = document.querySelector('#btn-theme-toggle i');
                this.#btn = document.getElementById('btn-theme-toggle');
                if (this.#btn && this.#icon) this.#init();
            }
            #init() {
                const localTheme = localStorage.getItem('theme');
                const sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const forceDark = localTheme === 'dark' || (!localTheme && sysTheme);
                this.toggle(forceDark);
                this.#btn.addEventListener('click', () => this.toggle(!this.isDark));
            }
            get isDark() { return this.#html.classList.contains(CONFIG.classes.dark); }
            toggle(forceDark) {
                if (forceDark) {
                    this.#html.classList.add(CONFIG.classes.dark);
                    localStorage.setItem('theme', 'dark');
                    this.#icon.className = 'fa-solid fa-sun text-white text-xs pointer-events-none';
                } else {
                    this.#html.classList.remove(CONFIG.classes.dark);
                    localStorage.setItem('theme', 'light');
                    this.#icon.className = 'fa-solid fa-moon text-white text-xs pointer-events-none';
                }
            }
        }

        class Renderer {
            #container; #templates;
            constructor() {
                this.#container = document.getElementById('main-content');
                this.#templates = {
                    week: document.getElementById('tpl-week-section'),
                    card: document.getElementById('tpl-card'),
                    btn: document.getElementById('tpl-button'),
                    empty: document.getElementById('tpl-empty'),
                    menuItem: document.getElementById('tpl-menu-item')
                };
            }

            #clone(id) { return this.#templates[id].content.cloneNode(true); }

            #createCard(item, showWeekBadge = false) {
                const node = this.#clone('card');
                const { subject, speaker, time, date, day, week, link1, link2, timestamp } = item;

                node.querySelector('[data-slot="date-day"]').textContent = `${date}, ${day}`;
                node.querySelector('[data-slot="subject"]').textContent = subject;
                node.querySelector('[data-slot="speaker"]').textContent = speaker || 'Belirtilmedi';
                node.querySelector('[data-slot="time"]').textContent = time;

                const joinBtn = node.querySelector('[data-slot="join-btn"]');
                
                // --- KATIL BUTONU GİZLEME (2 Saat Tolerans) ---
                const toleranceMs = (CONFIG.joinToleranceMinutes || 0) * 60 * 1000;
                
                if (joinBtn) {
                    if (timestamp > 0 && Date.now() > (timestamp + toleranceMs)) {
                        joinBtn.remove();
                    }
                }

                if (showWeekBadge) {
                    const badge = node.querySelector('[data-slot="week-badge"]');
                    badge.textContent = week;
                    badge.classList.remove('hidden');
                }

                const actionsContainer = node.querySelector('[data-slot="actions"]');
                
                if (!link1 && !link2) {
                    const span = document.createElement('span');
                    span.className = 'text-xs text-gray-400 italic';
                    span.textContent = 'Kayıt bulunmuyor';
                    actionsContainer.appendChild(span);
                } else {
                    if (link1) actionsContainer.appendChild(this.#createButton(link1, 'Ders Notu', 'fa-file-lines', 'primary'));
                    if (link2) actionsContainer.appendChild(this.#createButton(link2, 'Tilavet', 'fa-book-quran', 'secondary'));
                }
                return node;
            }

            #createButton(url, text, iconClass, type) {
                const node = this.#clone('btn');
                const a = node.querySelector('a');
                a.href = url;
                a.classList.add(...(type === 'primary' ? CONFIG.classes.btnPrimary : CONFIG.classes.btnSecondary));
                // BUTON EFEKTİ
                a.classList.add('shadow-sm', 'hover:shadow-md', 'hover:-translate-y-0.5', 'transition-all', 'duration-200');
                
                node.querySelector('i').classList.add('fa-solid', iconClass);
                node.querySelector('span').textContent = text;
                return node;
            }

            showLoading() {
                this.#container.innerHTML = `
                    <div class="text-center mt-10 text-emerald-600 dark:text-emerald-400 fade-in">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
                        <p>Ders programı yükleniyor...</p>
                    </div>`;
            }

            showError() {
                this.#container.innerHTML = `
                    <div class="text-center mt-10 text-red-500 fade-in">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <p>Veri yüklenemedi. İnternet bağlantınızı kontrol edin.</p>
                    </div>`;
            }

            renderSchedule(groupedData) {
                this.#container.innerHTML = '';
                const weeks = Object.keys(groupedData).reverse();
                
                if (weeks.length === 0) {
                    this.#container.appendChild(this.#clone('empty'));
                    return;
                }

                const fragment = document.createDocumentFragment();
                
                weeks.forEach((week, index) => {
                    const section = this.#clone('week');
                    const sectionEl = section.querySelector('section');
                    const header = sectionEl.querySelector('.week-header');
                    const content = sectionEl.querySelector('.week-content');
                    const icon = header.querySelector('[data-slot="toggle-icon"]');

                    section.querySelector('[data-slot="week-title"]').textContent = week;
                    groupedData[week].forEach(item => content.appendChild(this.#createCard(item)));

                    if (index === 0) {
                        content.classList.remove(CONFIG.classes.hidden);
                        icon.classList.add(CONFIG.classes.rotate);
                        header.setAttribute('aria-expanded', 'true');
                    }

                    header.addEventListener('click', () => {
                        const isHidden = content.classList.contains(CONFIG.classes.hidden);
                        content.classList.toggle(CONFIG.classes.hidden);
                        icon.classList.toggle(CONFIG.classes.rotate);
                        header.setAttribute('aria-expanded', isHidden);
                    });

                    fragment.appendChild(section);
                });
                
                this.#container.appendChild(fragment);
            }

            renderFiltered(list) {
                this.#container.innerHTML = '';
                if (!list?.length) {
                    this.#container.appendChild(this.#clone('empty'));
                    return;
                }
                const sortedList = list.sort((a, b) => b.timestamp - a.timestamp);
                const fragment = document.createDocumentFragment();
                const wrapper = document.createElement('div');
                wrapper.className = 'p-2 fade-in';
                sortedList.forEach(item => wrapper.appendChild(this.#createCard(item, true)));
                fragment.appendChild(wrapper);
                this.#container.appendChild(fragment);
            }

            renderMenu(items) {
                const menu = document.getElementById('menu-quran');
                if (!menu) return;
                menu.innerHTML = '';
                const fragment = document.createDocumentFragment();
                items.forEach(note => {
                    const node = this.#clone('menuItem');
                    const a = node.querySelector('a');
                    a.href = note.url;
                    node.querySelector('[data-slot="text"]').textContent = note.name;
                    const isAudio = note.name.toLowerCase().includes("dersi") && !note.name.toLowerCase().includes("not");
                    node.querySelector('[data-slot="icon"]').classList.add(isAudio ? "fa-file-audio" : "fa-file-lines");
                    fragment.appendChild(node);
                });
                menu.appendChild(fragment);
            }
        }

      // -------- MAIN APP CONTROLLER (GÜNCELLENDİ: ÖNBELLEK EKLENDİ) --------
        class App {
            #dataService; #renderer; #themeManager; #searchTimer;

            constructor() {
                this.#dataService = new DataService();
                this.#renderer = new Renderer();
                this.#themeManager = new ThemeManager();
            }

            async init() {
                // 1. Menüyü render et
                this.#renderer.renderMenu(this.#dataService.resources);
                
                // 2. Olay Dinleyicilerini (Arama kutusu vb.) BAŞTA bir kere tanımla
                // Böylece veri her güncellendiğinde tekrar tekrar tanımlanmaz.
                this.#bindEvents();

                // 3. ÖNBELLEK KONTROLÜ
                const cachedData = localStorage.getItem('ders_programi_v1');
                let hasCache = false;

                if (cachedData) {
                    try {
                        const parsedData = JSON.parse(cachedData);
                        if (Object.keys(parsedData).length > 0) {
                            // Önbellekteki veriyi sessizce bas
                            this.#renderer.renderSchedule(parsedData);
                            hasCache = true;
                        }
                    } catch (e) {
                        console.error("Önbellek hatası", e);
                    }
                }

                // Eğer önbellek yoksa yükleniyor animasyonunu göster
                if (!hasCache) {
                    this.#renderer.showLoading();
                }

                // 4. ARKA PLANDA GÜNCEL VERİYİ ÇEK
                const success = await this.#dataService.loadData();
                
                if (success) {
                    const freshData = this.#dataService.groupedSchedule;
                    const freshJson = JSON.stringify(freshData);

                    // --- KRİTİK DÜZELTME ---
                    // Eğer internetten gelen veri, ekrandaki (önbellek) veri ile AYNIYSA
                    // ekranı tekrar çizme. Bu sayede "titreme" veya "iki kere yükleme" olmaz.
                    if (cachedData !== freshJson) {
                        this.#renderer.renderSchedule(freshData);
                        localStorage.setItem('ders_programi_v1', freshJson);
                    } else {
                        console.log("Veri güncel, ekran yenilenmedi.");
                    }
                } else {
                    // Veri çekilemedi ve önbellek de yoksa hata göster
                    if (!hasCache) {
                        this.#renderer.showError();
                    }
                }
            }

            #bindEvents() {
                const searchInput = document.getElementById('input-search');
                
                // Arama kutusu için dinleyici (Sadece 1 kere eklenir)
                if (searchInput) {
                    // Eski listenerları temizlemek için clone hack'i
                    const newSearch = searchInput.cloneNode(true);
                    searchInput.parentNode.replaceChild(newSearch, searchInput);
                    
                    newSearch.addEventListener('input', (e) => {
                        clearTimeout(this.#searchTimer);
                        const val = e.target.value.trim();
                        this.#searchTimer = setTimeout(() => {
                            // Arama yapılırken önbellek/yeni veri fark etmez, o anki veride arar
                            val ? this.#renderer.renderFiltered(this.#dataService.search(val))
                                : this.#renderer.renderSchedule(this.#dataService.groupedSchedule);
                        }, CONFIG.searchDebounce);
                    });
                }

                this.#setupDropdown();
            }

            #setupDropdown() {
                const btn = document.getElementById('btn-quran-menu');
                const menu = document.getElementById('menu-quran');
                if (!btn || !menu) return;

                const newBtn = btn.cloneNode(true);
                btn.parentNode.replaceChild(newBtn, btn);
                
                const icon = newBtn.querySelector('.fa-chevron-down');
                let isOpen = false;

                const toggle = (force) => {
                    isOpen = force !== undefined ? force : !isOpen;
                    if (isOpen) {
                        menu.classList.remove(CONFIG.classes.hidden);
                        requestAnimationFrame(() => {
                            menu.classList.remove(...CONFIG.classes.menuOut);
                            menu.classList.add(...CONFIG.classes.menuIn);
                            icon.classList.add(CONFIG.classes.rotate);
                        });
                        newBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        menu.classList.remove(...CONFIG.classes.menuIn);
                        menu.classList.add(...CONFIG.classes.menuOut);
                        icon.classList.remove(CONFIG.classes.rotate);
                        newBtn.setAttribute('aria-expanded', 'false');
                        setTimeout(() => menu.classList.add(CONFIG.classes.hidden), 200);
                    }
                };

                newBtn.addEventListener('click', (e) => { e.stopPropagation(); toggle(); });
                document.addEventListener('click', (e) => {
                    if (isOpen && !newBtn.contains(e.target) && !menu.contains(e.target)) toggle(false);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => new App().init());
    })();
    </script>
</body>
