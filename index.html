      tailwind.config = {

                    fontFamily: { sans: ['Inter', 'sans-serif'] },

    <style>
      :root { --scroll-thumb: #cbd5e1; --scroll-track: transparent; }
        .dark { --scroll-thumb: #475569; }
        
        html {
            background-color: #047857; 
            scroll-behavior: smooth;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
            min-height: 100vh;
            background-color: #f3f4f6; 
        }

        .dark body { background-color: #111827; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--scroll-track); }
        ::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 10px; }

        .rotate-icon { transform: rotate(180deg); }
        .smooth-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        header {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 50;
            padding-top: env(safe-area-inset-top);

    <!-- 1. SCHEDULE APP SCRIPT -->
    <script>
      (function () {
            'use strict';
            if (window.DERS_PROGRAMI_APP_LOADED) return;
            window.DERS_PROGRAMI_APP_LOADED = true;

            window.toggleQuranView = (show) => {
                const scheduleApp = document.getElementById('app-schedule');
                const quranApp = document.getElementById('quran-root');
                if (show) {
                    scheduleApp.classList.add('hidden');
                    quranApp.classList.remove('hidden');
                    const isDark = document.documentElement.classList.contains('dark');
                    if(window.syncReactTheme) window.syncReactTheme(isDark);
                } else {
                    quranApp.classList.add('hidden');
                    scheduleApp.classList.remove('hidden');
                }
            };

            document.getElementById('btn-open-quran').addEventListener('click', (e) => {
                e.preventDefault();
                window.toggleQuranView(true);
            });

            const CONFIG = Object.freeze({
                CACHE_KEY: 'ders_programi_v8_xlsx',
                CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR-t6FwWuwU-JOYcDVEbLdkXT7R8cuvcuz9IPuOY78MPWM44MesHJKBHyI8ZVOehuh5yvv99yI2jLd/pub?output=xlsx',
                CLASSES: {
                    hidden: 'hidden', rotate: 'rotate-icon',
                    menuIn: ['scale-100', 'opacity-100'], menuOut: ['scale-95', 'opacity-0'],
                    btnPrimary: ['bg-emerald-50', 'dark:bg-emerald-900/40', 'text-emerald-700', 'dark:text-emerald-400', 'hover:bg-emerald-100', 'dark:hover:bg-emerald-900/60'],
                    btnSecondary: ['bg-amber-50', 'dark:bg-amber-900/30', 'text-amber-700', 'dark:text-amber-400', 'hover:bg-amber-100', 'dark:hover:bg-amber-900/50']
                },
                MONTHS: { 'ocak': 0, 'subat': 1, 'mart': 2, 'nisan': 3, 'mayis': 4, 'haziran': 5, 'temmuz': 6, 'agustos': 7, 'eylul': 8, 'ekim': 9, 'kasim': 10, 'aralik': 11 },
                SEARCH_DEBOUNCE_MS: 150, JOIN_TOLERANCE_MIN: 90
            });

            const EXTRA_RESOURCES = [
                { name: "Harf telaffuzu", url: "https://drive.google.com/file/d/1DLRV_JpC575qT6psdeiL9eI8VHE8usWw/view?usp=drive_link" },
                { name: "Kur'an Dersi 1", url: "https://drive.google.com/file/d/1-B8LH40llBzn27A3sBQQSBP-dI7P_sWO/view?usp=drive_link" },
                { name: "Kur'an Dersi 2", url: "https://drive.google.com/file/d/1djd_lLS8PyqmP-_5hjfkGR2jDm7dbRCp/view?usp=drive_link" },
                { name: "Kur'an Dersi 3", url: "https://drive.google.com/file/d/10YQXMUTkcMyWww5qFm6uKjtoreGaPGwI/view?usp=drive_link" },
                { name: "Kur'an Dersi 4", url: "https://drive.google.com/file/d/1shMgMEn30NPCrEHbgq0UWqZz21KDsmWI/view?usp=drive_link" },
                { name: "Kur'an Dersi 5", url: "https://drive.google.com/file/d/1DToY7jOE2OnyLQKhCs0s2WYLrN6AkTE8/view?usp=drive_link" },
                { name: "Kur'an Dersi 6", url: "https://drive.google.com/file/d/1RgscC_0-riGl4Ocjt46xKljns1MVeAVI/view?usp=drive_link" },
                { name: "Kur'an Dersi 7", url: "https://drive.google.com/file/d/1tT7208haWxluGZClorbA_KEL9q7CJKWC/view?usp=drive_link" },
                { name: "Kur'an Dersi 17", url: "https://drive.google.com/file/d/1IF52k3Yj-2mCdvomJ_Yml7Pe6d8au5Ps/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 1", url: "https://drive.google.com/file/d/1qiy60bnYz22o18KpV7UPotZhPqvNbZ2H/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 2", url: "https://drive.google.com/file/d/19BR6RSEGndxEAoyqiIKeEBRtmv5StuG3/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 3", url: "https://drive.google.com/file/d/1FAwK7eYkDEwJmdDL7aBHCvKxH-cLAMQw/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 4", url: "https://drive.google.com/file/d/1RSqFv2Wy16pmM4p4kxPFw3FYuLvNaJTg/view?usp=drive_link" },
                { name: "Kur'an dersi notlar 5", url: "https://drive.google.com/file/d/18Z8L6uLyV5do0GZaiODcdVSbuBVRiFYw/view?usp=drive_link" }
            ];

            const Utils = {
                normalizeText(val) {
                    if (!val) return '';
                    const trMap = { 'İ': 'i', 'I': 'ı', 'ı': 'i', 'ş': 's', 'Ş': 's', 'ğ': 'g', 'Ğ': 'g', 'ü': 'u', 'Ü': 'u', 'ö': 'o', 'Ö': 'o', 'ç': 'c', 'Ç': 'c' };
                    return String(val).replace(/[İIışŞğĞüÜöÖçÇ]/g, c => trMap[c] || c).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                },
                parseTimestamp(dateStr, timeStr) {
                    try {
                        const normDate = this.normalizeText(dateStr);
                        const normTime = timeStr ? timeStr.trim() : "00:00";
                        const dayMatch = normDate.match(/(\d+)/);
                        if (!dayMatch) return 0;
                        const day = parseInt(dayMatch[1], 10);
                        let monthIndex = -1;
                        for (const [key, val] of Object.entries(CONFIG.MONTHS)) {
                            if (normDate.includes(key) || normDate.includes(key.substring(0, 3))) {
                                monthIndex = val; break;
                            }
                        }
                        if (monthIndex === -1) return 0;
                        const [hour, minute] = normTime.split(':').map(n => parseInt(n, 10) || 0);
                        const now = new Date();
                        let year = now.getFullYear();
                        const currentMonth = now.getMonth();
                        if (currentMonth > 8 && monthIndex < 3) year += 1;
                        else if (currentMonth < 3 && monthIndex > 8) year -= 1;
                        return Date.UTC(year, monthIndex, day, hour - 3, minute);
                    } catch (e) { return 0; }
                }
            };

            class DataManager {
                constructor() { this.groupedData = {}; }
                get resources() { return EXTRA_RESOURCES; }
                loadFromCache() {
                    try {
                        const raw = localStorage.getItem(CONFIG.CACHE_KEY);
                        if (!raw) return null;
                        this.groupedData = JSON.parse(raw);
                        return this.groupedData;
                    } catch (e) { localStorage.removeItem(CONFIG.CACHE_KEY); return null; }
                }
                saveToCache(data) {
                    this.groupedData = data;
                    try { localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(data)); } catch (e) {}
                }
                async fetchFreshData() {
                    try {
                        const cacheBuster = `&_t=${Date.now()}&_r=${Math.floor(Math.random() * 1e7)}`;
                        const response = await fetch(CONFIG.CSV_URL + cacheBuster, { cache: 'no-store' });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const buffer = await response.arrayBuffer();
                        const workbook = XLSX.read(buffer, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: false });
                        return this.#processRows(rows);
                    } catch (error) { return null; }
                }
                #processRows(rows) {
                    const processed = rows.slice(1).map(cols => {
                        const clean = (val) => (val != null) ? String(val).trim() : '';
                        const item = {
                            week: clean(cols[0]), date: clean(cols[1]), day: clean(cols[2]),
                            time: clean(cols[3]), subject: clean(cols[4]), speaker: clean(cols[5]),
                            link1: clean(cols[6]), link2: clean(cols[7])
                        };
                        return {
                            ...item,
                            timestamp: Utils.parseTimestamp(item.date, item.time),
                            searchIndex: Utils.normalizeText(`${item.subject} ${item.speaker} ${item.date} ${item.day}`)
                        };
                    }).filter(item => item.subject);
                    return processed.reduce((acc, item) => {
                        (acc[item.week] = acc[item.week] || []).push(item);
                        return acc;
                    }, {});
                }
                search(query) {
                    if (!query) return [];
                    const normQ = Utils.normalizeText(query);
                    return Object.values(this.groupedData).flat().filter(item => item.searchIndex.includes(normQ));
                }
            }

            class Renderer {
                #container; #templates;
                constructor() {
                    this.#container = document.getElementById('main-content');
                    this.#templates = {
                        week: document.getElementById('tpl-week-section'),
                        card: document.getElementById('tpl-card'),
                        btn: document.getElementById('tpl-button'),
                        empty: document.getElementById('tpl-empty'),
                        menuItem: document.getElementById('tpl-menu-item')
                    };
                }
                #clone(id) { return this.#templates[id].content.cloneNode(true); }
                #setText(node, selector, text) { const el = node.querySelector(selector); if (el) el.textContent = text || ''; }
                #createCard(item, showWeekBadge = false) {
                    const node = this.#clone('card');
                    const { subject, speaker, time, date, day, week, link1, link2, timestamp } = item;
                    this.#setText(node, '[data-slot="date-day"]', `${date}, ${day}`);
                    this.#setText(node, '[data-slot="subject"]', subject);
                    this.#setText(node, '[data-slot="speaker"]', speaker || 'Belirtilmedi');
                    this.#setText(node, '[data-slot="time"]', time);
                    const toleranceMs = CONFIG.JOIN_TOLERANCE_MIN * 60 * 1000;
                    const joinBtn = node.querySelector('[data-slot="join-btn"]');
                    if (joinBtn && timestamp > 0 && Date.now() > (timestamp + toleranceMs)) joinBtn.remove();
                    if (showWeekBadge) {
                        const badge = node.querySelector('[data-slot="week-badge"]');
                        badge.textContent = week; badge.classList.remove('hidden');
                    }
                    const actionsContainer = node.querySelector('[data-slot="actions"]');
                    if (!link1 && !link2) {
                        const span = document.createElement('span');
                        span.className = 'text-xs text-gray-400 italic';
                        span.textContent = 'Kayıt bulunmuyor';
                        actionsContainer.appendChild(span);
                    } else {
                        if (link1) actionsContainer.appendChild(this.#createButton(link1, 'Ders Notu', 'fa-file-lines', 'primary'));
                        if (link2) actionsContainer.appendChild(this.#createButton(link2, 'Tilavet', 'fa-book-quran', 'secondary'));
                    }
                    return node;
                }
                #createButton(url, text, iconClass, type) {
                    const node = this.#clone('btn');
                    const a = node.querySelector('a'); a.href = url;
                    const classes = type === 'primary' ? CONFIG.CLASSES.btnPrimary : CONFIG.CLASSES.btnSecondary;
                    a.classList.add(...classes);
                    node.querySelector('i').classList.add('fa-solid', iconClass);
                    node.querySelector('span').textContent = text;
                    return node;
                }
                showLoading() { this.#container.innerHTML = `<div class="text-center mt-10 text-emerald-600 dark:text-emerald-400 fade-in"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i><p>Ders programı yükleniyor...</p></div>`; }
                showError() { this.#container.innerHTML = `<div class="text-center mt-10 text-red-500 fade-in"><i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i><p>Veri yüklenemedi. Bağlantınızı kontrol edin.</p><button onclick="location.reload()" class="mt-4 px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded text-sm font-bold">Tekrar Dene</button></div>`; }
                renderSchedule(groupedData) {
                    requestAnimationFrame(() => {
                        this.#container.innerHTML = '';
                        const weeks = Object.keys(groupedData).reverse();
                        if (weeks.length === 0) { this.#container.appendChild(this.#clone('empty')); return; }
                        const fragment = document.createDocumentFragment();
                        weeks.forEach((week, index) => {
                            const section = this.#clone('week');
                            const sectionEl = section.querySelector('section');
                            const header = sectionEl.querySelector('.week-header');
                            const content = sectionEl.querySelector('.week-content');
                            const icon = header.querySelector('[data-slot="toggle-icon"]');
                            this.#setText(section, '[data-slot="week-title"]', week);
                            groupedData[week].forEach(item => content.appendChild(this.#createCard(item)));
                            if (index === 0) { content.classList.remove(CONFIG.CLASSES.hidden); icon.classList.add(CONFIG.CLASSES.rotate); }
                            fragment.appendChild(section);
                        });
                        this.#container.appendChild(fragment);
                        this.#container.onclick = (e) => {
                            const header = e.target.closest('.week-header');
                            if (!header) return;
                            const section = header.parentElement;
                            const content = section.querySelector('.week-content');
                            const icon = header.querySelector('[data-slot="toggle-icon"]');
                            content.classList.toggle(CONFIG.CLASSES.hidden);
                            icon.classList.toggle(CONFIG.CLASSES.rotate);
                        };
                    });
                }
                renderFiltered(list) {
                    requestAnimationFrame(() => {
                        this.#container.innerHTML = '';
                        this.#container.onclick = null;
                        if (!list?.length) { this.#container.appendChild(this.#clone('empty')); return; }
                        const sortedList = [...list].sort((a, b) => b.timestamp - a.timestamp);
                        const wrapper = document.createElement('div');
                        wrapper.className = 'p-2 fade-in';
                        sortedList.forEach(item => wrapper.appendChild(this.#createCard(item, true)));
                        this.#container.appendChild(wrapper);
                    });
                }
                renderMenu(items) {
                    const menu = document.getElementById('menu-quran');
                    if (!menu) return;
                    items.forEach(note => {
                        const node = this.#clone('menuItem');
                        const a = node.querySelector('a'); a.href = note.url;
                        this.#setText(node, '[data-slot="text"]', note.name);
                        const isAudio = note.name.toLowerCase().includes("dersi") && !note.name.toLowerCase().includes("not");
                        node.querySelector('[data-slot="icon"]').classList.add(isAudio ? "fa-file-audio" : "fa-file-lines");
                        menu.appendChild(node);
                    });
                }
            }

            class ThemeManager {
                constructor() {
                    this.html = document.documentElement;
                    this.btn = document.getElementById('btn-theme-toggle');
                    this.icon = this.btn?.querySelector('i');
                    if(this.btn) this.init();
                }
                init() {
                    const local = localStorage.getItem('theme');
                    const sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    const isDark = local === 'dark' || (!local && sys);
                    this.apply(isDark);
                    this.btn.addEventListener('click', () => {
                        const isCurrentDark = this.html.classList.contains('dark');
                        this.apply(!isCurrentDark);
                    });
                }
                apply(isDark) {
                    this.html.classList.toggle('dark', isDark);
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                    if (this.icon) this.icon.className = isDark ? 'fa-solid fa-sun text-white text-xs' : 'fa-solid fa-moon text-white text-xs';
                    if(window.syncReactTheme) window.syncReactTheme(isDark);
                }
            }

            class App {
                #dataManager; #renderer; #themeManager; #searchTimer;
                constructor() {
                    this.#dataManager = new DataManager();
                    this.#renderer = new Renderer();
                    this.#themeManager = new ThemeManager();
                }
                async init() {
                    this.#renderer.renderMenu(this.#dataManager.resources);
                    this.#setupDropdown();
                    this.#bindSearch();
                    const cachedData = this.#dataManager.loadFromCache();
                    let isCachedDisplayed = false;
                    if (cachedData && Object.keys(cachedData).length > 0) { this.#renderer.renderSchedule(cachedData); isCachedDisplayed = true; } 
                    else { this.#renderer.showLoading(); }
                    const freshData = await this.#dataManager.fetchFreshData();
                    if (freshData) {
                        const hasChanges = JSON.stringify(cachedData || {}) !== JSON.stringify(freshData);
                        if (hasChanges || !isCachedDisplayed) { this.#dataManager.saveToCache(freshData); this.#renderer.renderSchedule(freshData); }
                    } else if (!isCachedDisplayed) { this.#renderer.showError(); }
                }
                #bindSearch() {
                    const input = document.getElementById('input-search');
                    if (!input) return;
                    input.addEventListener('input', (e) => {
                        clearTimeout(this.#searchTimer);
                        const query = e.target.value.trim();
                        this.#searchTimer = setTimeout(() => {
                            if (query) { const results = this.#dataManager.search(query); this.#renderer.renderFiltered(results); } 
                            else { this.#renderer.renderSchedule(this.#dataManager.groupedData); }
                        }, CONFIG.SEARCH_DEBOUNCE_MS);
                    });
                }
                #setupDropdown() {
                    const btn = document.getElementById('btn-quran-menu');
                    const menu = document.getElementById('menu-quran');
                    if (!btn || !menu) return;
                    const icon = btn.querySelector('.fa-chevron-down');
                    let isOpen = false;
                    const toggle = (force) => {
                        isOpen = force !== undefined ? force : !isOpen;
                        if (isOpen) {
                            menu.classList.remove(CONFIG.CLASSES.hidden);
                            requestAnimationFrame(() => {
                                menu.classList.remove(...CONFIG.CLASSES.menuOut); menu.classList.add(...CONFIG.CLASSES.menuIn);
                                icon.classList.add(CONFIG.CLASSES.rotate);
                            });
                        } else {
                            menu.classList.remove(...CONFIG.CLASSES.menuIn); menu.classList.add(...CONFIG.CLASSES.menuOut);
                            icon.classList.remove(CONFIG.CLASSES.rotate);
                            setTimeout(() => { if(!isOpen) menu.classList.add(CONFIG.CLASSES.hidden); }, 200);
                        }
                    };
                    btn.addEventListener('click', (e) => { e.stopPropagation(); toggle(); });
                    document.addEventListener('click', (e) => { if (isOpen && !btn.contains(e.target) && !menu.contains(e.target)) toggle(false); });
                }
            }
            document.addEventListener('DOMContentLoaded', () => new App().init());
        })();
    </script>

    <!-- 2. QURAN APP SCRIPT (REACT) -->
    <script type="text/babel">
      const { useState, useEffect, useRef, useContext, createContext, useMemo, useCallback } = React;

        const API_BASE = "https://api.alquran.cloud/v1";

        };
        const SURAH_NAMES_TR = ["Fâtiha", "Bakara", "Âl-i İmrân", "Nisâ", "Mâide", "En'âm", "A'râf", "Enfâl", "Tevbe", "Yûnus", "Hûd", "Yûsuf", "Ra'd", "İbrâhîm", "Hicr", "Nahl", "İsrâ", "Kehf", "Meryem", "Tâhâ", "Enbiyâ", "Hac", "Mü'minûn", "Nûr", "Furkân", "Şu'arâ", "Neml", "Kasas", "Ankebût", "Rûm", "Lokmân", "Secde", "Ahzâb", "Sebe'", "Fâtır", "Yâsîn", "Sâffât", "Sâd", "Zümer", "Mü'min", "Fussilet", "Şûrâ", "Zuhruf", "Duhân", "Câsiye", "Ahkâf", "Muhammed", "Fetih", "Hucurât", "Kâf", "Zâriyât", "Tûr", "Necm", "Kamer", "Rahmân", "Vâkıa", "Hadîd", "Mücâdele", "Haşr", "Mümtehine", "Saff", "Cum'a", "Münâfikûn", "Teğâbün", "Talâk", "Tahrîm", "Mülk", "Kalem", "Hâkka", "Meâric", "Nûh", "Cin", "Müzzemmil", "Müddessir", "Kıyâme", "İnsân", "Mürselât", "Nebe'", "Nâziât", "Abese", "Tekvîr", "İnfitâr", "Mutaffifîn", "İnşikâk", "Burûc", "Târık", "A'lâ", "Gâşiye", "Fecr", "Beled", "Şems", "Leyl", "Duhâ", "İnşirah", "Tîn", "Alak", "Kadir", "Beyyine", "Zilzâl", "Âdiyât", "Kâria", "Tekâsür", "Asr", "Hümeze", "Fîl", "Kureyş", "Mâûn", "Kevser", "Kâfirûn", "Nasr", "Tebbet", "İhlâs", "Felak", "Nâs"];
        const REVELATION_ORDER_MAP = { 1: 5, 2: 87, 3: 89, 4: 92, 5: 112, 6: 55, 7: 39, 8: 88, 9: 113, 10: 51, 11: 52, 12: 53, 13: 96, 14: 72, 15: 54, 16: 70, 17: 50, 18: 69, 19: 44, 20: 45, 21: 73, 22: 103, 23: 74, 24: 102, 25: 42, 26: 47, 27: 48, 28: 49, 29: 85, 30: 84, 31: 57, 32: 75, 33: 90, 34: 58, 35: 43, 36: 41, 37: 56, 38: 38, 39: 59, 40: 60, 41: 61, 42: 62, 43: 63, 44: 64, 45: 65, 46: 66, 47: 95, 48: 111, 49: 106, 50: 34, 51: 67, 52: 76, 53: 23, 54: 37, 55: 97, 56: 46, 57: 94, 58: 105, 59: 101, 60: 91, 61: 109, 62: 110, 63: 104, 64: 108, 65: 99, 66: 107, 67: 77, 68: 2, 69: 78, 70: 79, 71: 71, 72: 40, 73: 3, 74: 4, 75: 31, 76: 98, 77: 33, 78: 80, 79: 81, 80: 24, 81: 7, 82: 82, 83: 86, 84: 83, 85: 27, 86: 36, 87: 8, 88: 68, 89: 10, 90: 35, 91: 26, 92: 9, 93: 11, 94: 12, 95: 28, 96: 1, 97: 25, 98: 100, 99: 93, 100: 14, 101: 30, 102: 16, 103: 13, 104: 32, 105: 19, 106: 29, 107: 17, 108: 15, 109: 18, 110: 114, 111: 6, 112: 22, 113: 20, 114: 21 };

        const getSurahNameTR = (num) => (num < 1 || num > 114) ? "" : SURAH_NAMES_TR[num - 1];
        const normalizeText = (text) => text ? text.toLocaleLowerCase('tr').replace(/[’‘']/g, '').replace(/â/g, 'a').replace(/î/g, 'i').replace(/û/g, 'u').replace(/ğ/g, 'g').replace(/ü/g, 'u').replace(/ş/g, 's').replace(/ı/g, 'i').replace(/ö/g, 'o').replace(/ç/g, 'c') : "";
        const sortMatches = (list, type) => [...list].sort((a, b) => type === 'mushaf' ? (a.surah.number - b.surah.number) || (a.numberInSurah - b.numberInSurah) : ((REVELATION_ORDER_MAP[a.surah.number] || 999) - (REVELATION_ORDER_MAP[b.surah.number] || 999)) || (a.numberInSurah - b.numberInSurah));
        const formatTime = (time) => isNaN(time) ? "00:00" : `${Math.floor(time / 60)}:${Math.floor(time % 60).toString().padStart(2, '0')}`;

        const QuranContext = createContext();

        const QuranProvider = ({ children }) => {
            const [surahs, setSurahs] = useState([]);
            const [ayahs, setAyahs] = useState([]);
            const [fullQuranIndex, setFullQuranIndex] = useState(null);
            const [viewMode, setViewMode] = useState('reader');
            const [activeSurah, setActiveSurah] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [detailedResults, setDetailedResults] = useState([]);
            const [rawMatches, setRawMatches] = useState([]);
            const [loading, setLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");
            const [activeAyah, setActiveAyah] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const audioRef = useRef(new Audio());
            const [playlists, setPlaylists] = useState([]);
            const [selectedAyahs, setSelectedAyahs] = useState([]);
            const [activePlaylist, setActivePlaylist] = useState(null);
            const [fontSize, setFontSize] = useState(18);
            const [darkMode, setDarkMode] = useState(localStorage.getItem('theme') === 'dark');
            const [sortType, setSortType] = useState('mushaf');
            const [bookmark, setBookmark] = useState(null);

            useEffect(() => {
                const a = audioRef.current; a.preload = "auto";
                const updTime = () => setCurrentTime(a.currentTime);
                const updDur = () => setDuration(a.duration);
                const onEnd = () => { setIsPlaying(false); playNext(); };
                a.addEventListener('timeupdate', updTime); a.addEventListener('loadedmetadata', updDur);
                a.addEventListener('play', () => setIsPlaying(true)); a.addEventListener('pause', () => setIsPlaying(false));
                a.addEventListener('ended', onEnd);
                return () => { a.removeEventListener('timeupdate', updTime); a.removeEventListener('loadedmetadata', updDur); a.removeEventListener('ended', onEnd); };
            }, [ayahs, detailedResults, activeAyah, activePlaylist, viewMode]);

            useEffect(() => {
                const p = localStorage.getItem('quran_playlists'); if (p) setPlaylists(JSON.parse(p));
                const b = localStorage.getItem('quran_bookmark'); if (b) setBookmark(JSON.parse(b));
                setLoading(true); setLoadingText("Sureler yükleniyor...");
                fetch(`${API_BASE}/surah`).then(r => r.json()).then(d => { setSurahs(d.data); if (d.data?.length) fetchSurah(d.data[0]); }).catch(e => setLoading(false));
            }, []);

            useEffect(() => { localStorage.setItem('quran_playlists', JSON.stringify(playlists)); }, [playlists]);
            useEffect(() => { if (activeAyah) { const b = { surah: activeAyah.surahName, number: activeAyah.number, numberInSurah: activeAyah.numberInSurah, surahNumber: activeAyah.surahNumber || activeSurah?.number }; setBookmark(b); localStorage.setItem('quran_bookmark', JSON.stringify(b)); } }, [activeAyah]);

            const playAyah = (ayah) => {
                if (activeAyah?.number === ayah.number) { audioRef.current.paused ? audioRef.current.play() : audioRef.current.pause(); } 
                else { setActiveAyah(ayah); audioRef.current.src = ayah.audio || ""; if(ayah.audio) { audioRef.current.load(); audioRef.current.play().catch(console.error); } }
            };

            const playNext = () => {
                const list = (viewMode === 'playlist_view' && activePlaylist) ? activePlaylist.items : (viewMode === 'search' ? detailedResults : ayahs);
                const idx = list.findIndex(a => a.number === activeAyah?.number);
                if (idx !== -1 && idx < list.length - 1) playAyah(list[idx + 1]);
            };

            const playPrev = () => {
                const list = (viewMode === 'playlist_view' && activePlaylist) ? activePlaylist.items : (viewMode === 'search' ? detailedResults : ayahs);
                const idx = list.findIndex(a => a.number === activeAyah?.number);
                if (idx > 0) playAyah(list[idx - 1]);
            };

            const fetchSurah = async (surah) => {
                setLoading(true); setViewMode('reader'); setSearchQuery(''); setRawMatches([]); setDetailedResults([]); setActiveSurah(surah);
                try {
                    const eds = `${EDITIONS.arabic},${EDITIONS.transliteration},${EDITIONS.tr_diyanet},${EDITIONS.tr_yazir},${EDITIONS.tr_ates},${EDITIONS.audio}`;
                    const [er, mr] = await Promise.all([fetch(`${API_BASE}/surah/${surah.number}/editions/${eds}`), fetch(`${API_BASE}/surah/${surah.number}`)]);
                    const ed = await er.json(); const md = await mr.json();
                    if (md.code === 200) setActiveSurah(p => ({ ...p, ...md.data }));
                    setAyahs(ed.data[0].ayahs.map((a, i) => ({
                        number: a.number, numberInSurah: a.numberInSurah, surahName: getSurahNameTR(surah.number), surahNumber: surah.number,
                        text: a.text, transliteration: ed.data[1].ayahs[i].text, diyanet: ed.data[2].ayahs[i].text,
                        yazir: ed.data[3].ayahs[i].text, ates: ed.data[4].ayahs[i].text, audio: ed.data[5].ayahs[i].audio
                    })));
                } catch (e) {} finally { setLoading(false); }
            };

            const fetchDetailsForMatches = async (matches) => {
                const eds = `${EDITIONS.arabic},${EDITIONS.transliteration},${EDITIONS.tr_diyanet},${EDITIONS.tr_yazir},${EDITIONS.tr_ates},${EDITIONS.audio}`;
                const promises = matches.map(async (m) => {
                    try {
                        const r = await fetch(`${API_BASE}/ayah/${m.surah.number}:${m.numberInSurah}/editions/${eds}`);
                        const d = await r.json(); const x = d.data;
                        return {
                            number: x[0].number, numberInSurah: x[0].numberInSurah, surahName: getSurahNameTR(m.surah.number), surahNumber: m.surah.number,
                            text: x[0].text, transliteration: x[1].text, diyanet: x[2].text, yazir: x[3].text, ates: x[4].text, audio: x[5].audio
                        };
                    } catch(e) { return null; }
                });
                return (await Promise.all(promises)).filter(r => r !== null);
            };

            const handleSearch = async (qRaw) => {
                if (!qRaw.trim()) return; setSearching(true); setViewMode('search'); setRawMatches([]); setDetailedResults([]);
                try {
                    let qData = fullQuranIndex;
                    if (!qData) {
                        const c = localStorage.getItem('quran_index_v1');
                        if (c) { qData = JSON.parse(c); setFullQuranIndex(qData); } else {
                            const r = await fetch(`${API_BASE}/quran/${EDITIONS.tr_diyanet}`); const d = await r.json();
                            qData = []; d.data.surahs.forEach(s => s.ayahs.forEach(a => qData.push({ surah: { number: s.number }, number: a.number, numberInSurah: a.numberInSurah, text: a.text })));
                            setFullQuranIndex(qData); try { localStorage.setItem('quran_index_v1', JSON.stringify(qData)); } catch(e) {}
                        }
                    }
                    const nQ = normalizeText(qRaw); let sID = null; let sT = nQ;
                    const sm = SURAH_NAMES_TR.map((n, i) => ({ name: n, id: i + 1, norm: normalizeText(n) }));
                    const fs = sm.find(s => nQ.startsWith(s.norm + ' '));
                    if (fs) { const r = nQ.slice(fs.norm.length).trim(); if (r) { sID = fs.id; sT = r; } }
                    let matches = qData.filter(i => (sID ? i.surah.number === sID : true) && normalizeText(i.text).includes(sT));
                    matches = sortMatches(matches, sortType); setRawMatches(matches);
                    const det = await fetchDetailsForMatches(matches.slice(0, 5)); setDetailedResults(det);
                } catch (e) {} finally { setSearching(false); }
            };

            const [searching, setSearching] = useState(false);

            return <QuranContext.Provider value={{
                surahs, ayahs, viewMode, setViewMode, activeSurah, setActiveSurah, fetchSurah, searchQuery, setSearchQuery, handleSearch,
                rawMatches, detailedResults, setDetailedResults, activeAyah, isPlaying, playAyah, playNext, playPrev,
                seek: (t) => { audioRef.current.currentTime = t; setCurrentTime(t); }, currentTime, duration,
                closePlayer: () => { audioRef.current.pause(); setActiveAyah(null); }, playlists, setPlaylists,

                darkMode, setDarkMode, sortType, setSortType, bookmark, fetchDetailsForMatches, loading, loadingText, searching
            }}>{children}</QuranContext.Provider>;
        };

        const useQuran = () => useContext(QuranContext);

        const InfiniteScrollTrigger = ({ onIntersect }) => {
            const r = useRef();
            useEffect(() => {
                const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) onIntersect(); }, { threshold: 0.1 });
                if (r.current) o.observe(r.current); return () => o.disconnect();
            }, [onIntersect]);
            return <div ref={r} className="h-10 w-full flex justify-center items-center"><i className="fa-solid fa-ellipsis fa-fade text-emerald-500"></i></div>;
        };

        const AyahCard = React.memo(({ ayahData }) => {
            const { activeAyah, isPlaying, playAyah, fontSize, selectedAyahs, setSelectedAyahs, playlists, setPlaylists, viewMode, activePlaylist } = useQuran();
            const active = activeAyah?.number === ayahData.number;
            const sel = selectedAyahs.some(s => s.number === ayahData.number);
            const [showModal, setShowModal] = useState(false);
            const [newP, setNewP] = useState("");

            return (
                <div id={`ayah-${ayahData.number}`} className={`rounded-xl shadow-sm border mb-6 overflow-hidden transition-all duration-200 ${active ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 ring-2 ring-emerald-400/50' : 'bg-white dark:bg-gray-800 border-slate-200 dark:border-gray-700'} ${sel ? 'ring-2 ring-emerald-500 bg-emerald-50/30' : ''}`}>
                    <div className="bg-slate-50 dark:bg-gray-900/50 px-4 py-2 border-b flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setSelectedAyahs(p => sel ? p.filter(x => x.number !== ayahData.number) : [...p, ayahData])} className={`w-5 h-5 rounded border flex items-center justify-center ${sel ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-gray-300 dark:bg-gray-700'}`}>
                                {sel && <i className="fa-solid fa-check text-[10px]"></i>}
                            </button>
                            <span className="text-xs font-bold text-emerald-600 dark:text-emerald-400 bg-emerald-100 dark:bg-emerald-900/30 px-2 py-1 rounded">{ayahData.surahName} - {ayahData.numberInSurah}</span>
                        </div>
                        <div className="flex gap-2 relative">
                            {viewMode === 'playlist_view' ? (
                                <button onClick={() => setPlaylists(p => p.map(l => l.id === activePlaylist.id ? {...l, items: l.items.filter(x => x.number !== ayahData.number)} : l))} className="w-7 h-7 flex items-center justify-center rounded-full bg-red-100 text-red-600"><i className="fa-solid fa-trash text-xs"></i></button>
                            ) : (
                                <button onClick={() => setShowModal(true)} className="w-7 h-7 flex items-center justify-center rounded-full bg-slate-200 dark:bg-gray-700 dark:text-slate-300"><i className="fa-solid fa-folder-plus text-xs"></i></button>
                            )}
                            <button onClick={() => playAyah(ayahData)} className={`px-3 py-1 rounded-full text-xs font-medium ${active && isPlaying ? 'bg-amber-100 text-amber-700 animate-pulse' : 'bg-slate-200 dark:bg-gray-700 dark:text-slate-300'}`}>
                                {active && isPlaying ? <><i className="fa-solid fa-pause"></i> Duraklat</> : <><i className="fa-solid fa-play"></i> Dinle</>}
                            </button>
                            {showModal && (
                                <div className="absolute right-0 top-8 z-50 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-xl border p-2 fade-in">
                                    <div className="flex justify-between items-center mb-2 pb-2 border-b dark:border-gray-700"><span className="text-xs font-bold">Listeye Ekle</span><button onClick={()=>setShowModal(false)}><i className="fa-solid fa-xmark text-gray-400"></i></button></div>
                                    <ul className="max-h-32 overflow-y-auto mb-2">{playlists.map(p=>(<li key={p.id}><button onClick={()=>{setPlaylists(x=>x.map(l=>l.id===p.id?{...l,items:[...l.items,ayahData]}:l));setShowModal(false)}} className="w-full text-left text-xs p-1.5 hover:bg-emerald-50 dark:hover:bg-gray-700 rounded truncate">{p.name}</button></li>))}</ul>
                                    <div className="flex gap-1"><input type="text" value={newP} onChange={(e)=>setNewP(e.target.value)} placeholder="Yeni" className="w-full text-xs p-1 rounded border dark:bg-gray-700" /><button onClick={()=>{if(newP){setPlaylists([...playlists,{id:Date.now(),name:newP,items:[ayahData]}]);setNewP("");setShowModal(false);}}} className="bg-emerald-600 text-white px-2 rounded"><i className="fa-solid fa-plus text-xs"></i></button></div>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="p-6">
                        <div className="text-right mb-6 leading-loose" dir="rtl"><p style={{ fontFamily: "'Amiri', serif", fontSize: `${fontSize + 12}px` }}>{ayahData.text}</p></div>
                        <div className="mb-6 p-3 bg-slate-50 dark:bg-gray-900/50 rounded-lg border-l-4 border-slate-300"><h4 className="text-[10px] uppercase tracking-wider text-slate-500 mb-1 font-bold">Okunuş</h4><p className="italic text-slate-600 dark:text-slate-400" style={{ fontSize: `${fontSize - 2}px` }}>{ayahData.transliteration}</p></div>
                        <div className="grid gap-4">
                            <div className="p-4 rounded-lg bg-emerald-50/50 dark:bg-emerald-900/10 border border-emerald-100"><h4 className="text-xs font-bold text-emerald-700 mb-2">Diyanet</h4><p style={{ fontSize: `${fontSize}px` }}>{ayahData.diyanet}</p></div>
                            <div className="grid md:grid-cols-2 gap-4">
                                <div className="p-4 rounded-lg bg-slate-50 dark:bg-gray-700/30 border border-slate-100"><h4 className="text-xs font-bold text-slate-500 mb-2">Elmalılı</h4><p style={{ fontSize: `${fontSize - 1}px` }}>{ayahData.yazir}</p></div>
                                <div className="p-4 rounded-lg bg-slate-50 dark:bg-gray-700/30 border border-slate-100"><h4 className="text-xs font-bold text-slate-500 mb-2">S. Ateş</h4><p style={{ fontSize: `${fontSize - 1}px` }}>{ayahData.ates}</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        });

        const PlayerBar = () => {
            const { activeAyah, isPlaying, playAyah, closePlayer, playNext, playPrev, currentTime, duration, seek } = useQuran();
            if (!activeAyah) return null;
            return (
                <div className="fixed bottom-0 left-0 w-full bg-white dark:bg-gray-900 border-t border-emerald-500/30 shadow-lg p-2 z-50 flex flex-col gap-2">
                    <div className="w-full flex items-center gap-2 px-2"><span className="text-[10px] text-gray-500 w-8 text-right">{formatTime(currentTime)}</span><input type="range" min="0" max={duration || 100} value={currentTime} onChange={(e)=>seek(Number(e.target.value))} className="flex-1 h-1 bg-gray-200 rounded-lg appearance-none accent-emerald-600" /><span className="text-[10px] text-gray-500 w-8">{formatTime(duration)}</span></div>
                    <div className="flex items-center justify-between px-2 pb-1">
                        <div className="flex-1 truncate pr-4"><h3 className="text-xs font-bold truncate">{activeAyah.surahName} {activeAyah.numberInSurah}. Ayet</h3></div>
                        <div className="flex items-center gap-3">
                            <button onClick={playPrev} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800"><i className="fa-solid fa-backward-step text-xs"></i></button>
                            <button onClick={()=>playAyah(activeAyah)} className="w-10 h-10 rounded-full bg-emerald-600 text-white shadow-lg">{isPlaying ? <i className="fa-solid fa-pause"></i> : <i className="fa-solid fa-play ml-1"></i>}</button>
                            <button onClick={playNext} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-800"><i className="fa-solid fa-forward-step text-xs"></i></button>
                            <button onClick={closePlayer} className="w-8 h-8 rounded-full bg-red-50 text-red-500 ml-2"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    </div>
                </div>
            );
        };

        const SurahList = React.memo(() => {
            const { surahs, activeSurah, fetchSurah, sortType, setSortType } = useQuran();
            const sorted = useMemo(() => [...surahs].sort((a,b) => sortType==='mushaf' ? a.number-b.number : (REVELATION_ORDER_MAP[a.number]||999)-(REVELATION_ORDER_MAP[b.number]||999)), [surahs, sortType]);
            return (
                <div className="h-full overflow-y-auto bg-slate-50 border-r dark:bg-gray-900 dark:border-gray-700 w-full md:w-64 hidden md:block">
                    <div className="p-4 border-b bg-white dark:bg-gray-900 sticky top-0 z-10 flex justify-between items-center">
                        <h2 className="font-bold text-slate-700 dark:text-slate-200">Sureler</h2>
                        <button onClick={()=>setSortType(p=>p==='mushaf'?'revelation':'mushaf')} className="text-xs bg-slate-100 dark:bg-gray-800 px-2 py-1 rounded"><i className={`fa-solid ${sortType==='mushaf'?'fa-arrow-down-1-9':'fa-clock-rotate-left'}`}></i></button>
                    </div>
                    <ul>{sorted.map(s => (<li key={s.number}><button onClick={()=>fetchSurah(s)} className={`w-full text-left p-3 hover:bg-emerald-50 dark:hover:bg-gray-800 border-b ${activeSurah?.number===s.number ? 'bg-emerald-100 dark:bg-emerald-900/30 font-semibold' : ''}`}><div className="flex items-center gap-3"><span className="text-xs w-6 h-6 flex items-center justify-center rounded-full bg-slate-200 dark:bg-gray-700">{s.number}</span><span>{getSurahNameTR(s.number)}</span></div></button></li>))}</ul>
                </div>
            );
        });

        const MainContent = () => {
            const { viewMode, setViewMode, activeSurah, ayahs, searching, searchQuery, rawMatches, detailedResults, setDetailedResults, fetchDetailsForMatches, loading, loadingText, playlists, activePlaylist, bookmark, surahs, sortType, setSortType, activeAyah } = useQuran();
            const [limit, setLimit] = useState(10);

            // ==========================================
            // OTOMATİK SCROLL ÖZELLİĞİ
            // ==========================================
            useEffect(() => {
                if (activeAyah) {
                    const element = document.getElementById(`ayah-${activeAyah.number}`);
                    if (element) {
                        element.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'center' 
                        });
                    }
                }
            }, [activeAyah]);

            useEffect(() => { setLimit(10); }, [viewMode, activeSurah, searchQuery]);
            const handleMore = useCallback(() => {
                if (viewMode==='reader' && limit<ayahs.length) setLimit(p=>Math.min(p+10, ayahs.length));
                else if (viewMode==='search' && detailedResults.length<rawMatches.length) fetchDetailsForMatches(rawMatches.slice(detailedResults.length, detailedResults.length+5)).then(d=>setDetailedResults(p=>[...p,...d]));
            }, [viewMode, limit, ayahs.length, detailedResults.length, rawMatches]);

            const items = useMemo(() => {
                if (viewMode==='reader') return ayahs.slice(0, limit);
                if (viewMode==='search') return detailedResults;
                if (viewMode==='playlist_view' && activePlaylist) return activePlaylist.items;
                return [];
            }, [viewMode, ayahs, limit, detailedResults, activePlaylist]);

            return (
                <main className="flex-1 overflow-y-auto bg-slate-100 dark:bg-gray-900/50 p-4 md:p-8 pt-16 md:pt-8" id="main-scroll">
                    <div className="max-w-4xl mx-auto pb-32">
                        {loading && <div className="flex flex-col items-center justify-center h-64 text-emerald-600 animate-pulse"><i className="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i><p>{loadingText}</p></div>}
                        {!loading && !searching && viewMode === 'reader' && (
                            <div className="md:hidden absolute top-0 left-0 w-full z-10 bg-white dark:bg-gray-800 border-b p-2 flex gap-2">
                                <select onChange={(e)=>fetchSurah(surahs.find(s=>s.number===parseInt(e.target.value)))} className="flex-1 p-2 rounded border dark:bg-gray-700 dark:text-white" value={activeSurah?.number || 1}>
                                    {surahs.map(s=>(<option key={s.number} value={s.number}>{s.number}. {getSurahNameTR(s.number)}</option>))}
                                </select>
                            </div>
                        )}
                        {!loading && !searching && viewMode==='reader' && (
                            <div className="text-center mb-8 border-b pb-6 fade-in">
                                <h2 className="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-2">{getSurahNameTR(activeSurah?.number)}</h2>
                                <div className="flex justify-center gap-2 text-sm text-gray-500"><span>{activeSurah?.numberOfAyahs} Ayet</span><span>•</span><span>{activeSurah?.revelationType==='Meccan'?'Mekke':'Medine'}</span></div>
                            </div>
                        )}
                        {items.map((a, i) => (<AyahCard key={`${a.number}-${i}`} ayahData={a} />))}
                        {((viewMode==='reader' && limit<ayahs.length) || (viewMode==='search' && detailedResults.length<rawMatches.length)) && <InfiniteScrollTrigger onIntersect={handleMore} />}
                        {!loading && viewMode === 'playlists_list' && (
                            <div className="fade-in">
                                <h2 className="text-2xl font-bold mb-6">Listelerim</h2>
                                <div className="grid md:grid-cols-2 gap-4">{playlists.map(p => (<div key={p.id} onClick={()=>{setActivePlaylist(p);setViewMode('playlist_view')}} className="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border cursor-pointer hover:border-emerald-400"><h3>{p.name}</h3><p className="text-sm text-gray-500">{p.items.length} Ayet</p></div>))}</div>
                            </div>
                        )}
                    </div>
                </main>
            );
        };

        const AppContainer = () => {
            const { darkMode, setDarkMode, searchQuery, setSearchQuery, handleSearch, setViewMode, fontSize, setFontSize } = useQuran();
            useEffect(() => { document.documentElement.classList.toggle('dark', darkMode); }, [darkMode]);
            return (
                <div className="flex flex-col h-full font-sans relative">
                    <header className="bg-emerald-700 dark:bg-emerald-900 text-white px-4 pb-2 shadow-lg z-20 sticky top-0">
                        <div className="max-w-md mx-auto relative pt-2">
                             <button onClick={() => setDarkMode(!darkMode)} className="absolute right-0 top-1 bg-emerald-600 p-2 rounded-full w-9 h-9 flex items-center justify-center border border-emerald-500">{darkMode ? <i className="fa-solid fa-sun text-xs"></i> : <i className="fa-solid fa-moon text-xs"></i>}</button>
                            <div className="mb-2 flex items-center gap-3 pr-10">
                                <button onClick={()=>window.toggleQuranView(false)} className="bg-emerald-800 p-2 rounded-lg h-9 w-9 flex items-center justify-center"><i className="fa-solid fa-arrow-left text-sm"></i></button>
                                <div><h1 className="text-xl font-bold leading-none">Kuran Rehberi</h1></div>
                            </div>
                            <div className="flex gap-2 items-center mb-2">
                                <form onSubmit={(e)=>{e.preventDefault(); handleSearch(searchQuery)}} className="relative flex-1">
                                    <input type="text" placeholder="Ara..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)} className="w-full p-2 pl-9 rounded-lg text-sm text-gray-800 dark:bg-gray-800 dark:text-white" />
                                    <button type="submit" className="absolute left-0 top-0 h-full w-10 flex items-center justify-center text-gray-400"><i className="fa-solid fa-search text-sm"></i></button>
                                </form>
                                <button onClick={()=>setViewMode('playlists_list')} className="bg-emerald-800 p-2 rounded-lg w-10 h-10 flex items-center justify-center"><i className="fa-solid fa-layer-group"></i></button>
                            </div>
                            <div className="flex justify-end gap-2 items-center text-xs">
                                <button onClick={()=>setFontSize(Math.max(14,fontSize-2))} className="bg-emerald-600 px-2 py-1 rounded">-</button>
                                <span>{fontSize}px</span>
                                <button onClick={()=>setFontSize(Math.min(32,fontSize+2))} className="bg-emerald-600 px-2 py-1 rounded">+</button>
                            </div>
                        </div>
                    </header>
                    <div className="flex flex-1 overflow-hidden relative"><SurahList /><MainContent /><PlayerBar /></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('quran-root'));
        root.render(<QuranProvider><AppContainer /></QuranProvider>);
    </script>
  </body>
</html>
