            html.classList.add('dark');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        } else {
            html.classList.remove('dark');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        }

            if (html.classList.contains('dark')) {

                link.href = note.url;
                link.target = "_blank";
                link.className = "flex items-center p-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition duration-150 border-b border-gray-100 dark:border-gray-700 last:border-b-0";
                
                // İkon Seçimi: 'Dersi' kelimesi geçiyorsa ses dosyası, 'notlar' geçiyorsa döküman ikonu
                let iconClass = "fa-file-lines"; // Varsayılan: Döküman
                if (note.name.toLowerCase().includes("dersi") && !note.name.toLowerCase().includes("not")) {
                    iconClass = "fa-file-audio"; // Ses dosyası
                }
                
                link.innerHTML = `<i class="fa-solid ${iconClass} mr-3 text-emerald-500 w-5 text-center"></i> ${note.name}`;
                menu.appendChild(link);
            });
        }
        
        function toggleQuranNotes() {
            const menu = document.getElementById('quranNotesMenu');
            const icon = document.getElementById('quranNotesIcon');
            
            if (menu.classList.contains('hidden')) {
                renderQuranNotes();
                menu.classList.remove('hidden');
                icon.classList.add('rotate-icon');
            } else {
                menu.classList.add('hidden');
                icon.classList.remove('rotate-icon');
            }
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('quranNotesMenu');
            const btn = document.getElementById('quranNotesBtn');
            const icon = document.getElementById('quranNotesIcon');
            
            if (menu && btn && !btn.contains(e.target) && !menu.contains(e.target)) {
                if (!menu.classList.contains('hidden')) {
                    menu.classList.add('hidden');
                    icon.classList.remove('rotate-icon');
                }
            }
        });

        function renderSchedule(data) {
            const container = document.getElementById('contentArea');
            container.innerHTML = '';

            const groups = data.reduce((acc, item) => {
                if (!acc[item.week]) acc[item.week] = [];
                acc[item.week].push(item);
                return acc;
            }, {});

            const sortedWeeks = Object.keys(groups).reverse();

            sortedWeeks.forEach((week, index) => {
                const weekSection = document.createElement('section');
                weekSection.className = 'mb-4 bg-white dark:bg-gray-800 rounded-xl shadow-sm overflow-hidden transition-colors duration-300';

                const header = document.createElement('div');
                header.className = 'week-header p-4 flex justify-between items-center border-b border-gray-100 dark:border-gray-700 hover:bg-emerald-50 dark:hover:bg-gray-700';
                
                const isOpen = index === 0; 
                
                header.onclick = () => toggleWeek(header);
                header.innerHTML = `
                    <h2 class="font-bold text-emerald-800 dark:text-emerald-400"><i class="fa-regular fa-calendar-days mr-2 text-emerald-600 dark:text-emerald-400"></i>${week}</h2>
                    <i class="fa-solid fa-chevron-down text-gray-400 smooth-transition ${isOpen ? 'rotate-icon' : ''}"></i>
                `;

                const list = document.createElement('div');
                list.className = `p-2 bg-gray-50 dark:bg-gray-900 ${isOpen ? '' : 'hidden'} transition-colors duration-300`;

                groups[week].forEach(item => {
                    const card = createCard(item);
                    list.appendChild(card);
                });

                weekSection.appendChild(header);
                weekSection.appendChild(list);
                container.appendChild(weekSection);
            });
            
            if(Object.keys(groups).length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 mt-10"><i class="fa-solid fa-filter-circle-xmark text-4xl mb-3"></i><p>Sonuç bulunamadı.</p></div>`;
            }
        }

        function createCard(item, showWeek = false) {
            const card = document.createElement('div');
            card.className = 'bg-white dark:bg-gray-800 p-4 rounded-lg shadow-sm mb-3 border-l-4 border-emerald-500 ml-1 mr-1 mt-1 transition-colors duration-300';
            
            let buttonsHtml = '';
            
            const link1Btn = item.link1 
                ? `<a href="${item.link1}" target="_blank" class="flex-1 text-center bg-emerald-50 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400 py-2 rounded-md text-sm font-semibold hover:bg-emerald-100 dark:hover:bg-emerald-900/60 transition"><i class="fa-solid fa-file-lines mr-1"></i> Ders Notu</a>` 
                : '';
                
            const link2Btn = item.link2 
                ? `<a href="${item.link2}" target="_blank" class="flex-1 text-center bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 py-2 rounded-md text-sm font-semibold hover:bg-amber-100 dark:hover:bg-amber-900/50 transition"><i class="fa-solid fa-book-quran mr-1"></i> Tilavet</a>` 
                : '';

            if (!link1Btn && !link2Btn) {
                 buttonsHtml = `<span class="text-xs text-gray-400 italic">Kayıt bulunmuyor</span>`;
            } else {
                buttonsHtml = `
                    ${link1Btn}
                    ${(link1Btn && link2Btn) ? '<div class="w-2"></div>' : ''}
                    ${link2Btn}
                `;
            }

            const weekBadge = showWeek ? `<span class="ml-2 text-[10px] bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded">${item.week}</span>` : '';

            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wide flex items-center">
                            ${item.date}, ${item.day} ${weekBadge}
                        </span>
                        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 leading-tight mt-1">${item.subject}</h3>
                    </div>
                    <span class="text-xs font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded">${item.time}</span>
                </div>
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-4"><i class="fa-solid fa-user-tag mr-1 opacity-50"></i> ${item.speaker || 'Belirtilmedi'}</p>
                
                <div class="flex mt-3 pt-3 border-t border-gray-100 dark:border-gray-700">
                    ${buttonsHtml}
                </div>
            `;
            return card;
        }

        function toggleWeek(header) {
            const list = header.nextElementSibling;
            const icon = header.querySelector('.fa-chevron-down');
            
            if (list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                icon.classList.add('rotate-icon');
            } else {
                list.classList.add('hidden');
                icon.classList.remove('rotate-icon');
            }
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            if(!query) {
                renderSchedule(rawData);
                return;
            }

            const filtered = rawData.filter(item => 
                item.subject.toLowerCase().includes(query) || 
                item.speaker.toLowerCase().includes(query) ||
                item.date.toLowerCase().includes(query)
            );
            
            renderFiltered(filtered);
        }

        function renderFiltered(data) {
             const container = document.getElementById('contentArea');
             container.innerHTML = '';
             
             if(data.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 mt-10"><i class="fa-solid fa-filter-circle-xmark text-4xl mb-3"></i><p>Sonuç bulunamadı.</p></div>`;
                return;
             }

             const list = document.createElement('div');
             list.className = 'p-2';
             
             data.forEach(item => {
                const card = createCard(item, true);
                list.appendChild(card);
             });
             container.appendChild(list);
        }

        renderSchedule(rawData);
    </script>
</body>
</html>
