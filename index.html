    <script>
    (function () {
        'use strict';

        const CONFIG = Object.freeze({
            csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQR-t6FwWuwU-JOYcDVEbLdkXT7R8cuvcuz9IPuOY78MPWM44MesHJKBHyI8ZVOehuh5yvv99yI2jLd/pub?gid=942881775&single=true&output=csv',
            classes: {
                hidden: 'hidden',
                rotate: 'rotate-icon',
                dark: 'dark',
                menuIn: ['scale-100', 'opacity-100'],
                menuOut: ['scale-95', 'opacity-0'],
                btnPrimary: ['bg-emerald-50', 'dark:bg-emerald-900/40', 'text-emerald-700', 'dark:text-emerald-400', 'hover:bg-emerald-100', 'dark:hover:bg-emerald-900/60'],
                btnSecondary: ['bg-amber-50', 'dark:bg-amber-900/30', 'text-amber-700', 'dark:text-amber-400', 'hover:bg-amber-100', 'dark:hover:bg-amber-900/50']
            },
            months: {
                'ocak': 0, 'subat': 1, 'mart': 2, 'nisan': 3, 'mayis': 4, 'haziran': 5,
                'temmuz': 6, 'agustos': 7, 'eylul': 8, 'ekim': 9, 'kasim': 10, 'aralik': 11
            },
            searchDebounce: 150,
            joinToleranceMinutes: 120,
            cacheKey: 'ders_programi_data_v2',
            cacheVersion: 1
        });

        const EXTRA_RESOURCES = Object.freeze([
            { name: "Harf telaffuzu", url: "https://drive.google.com/file/d/1DLRV_JpC575qT6psdeiL9eI8VHE8usWw/view?usp=drive_link" },
            { name: "Kur'an Dersi 1", url: "https://drive.google.com/file/d/1-B8LH40llBzn27A3sBQQSBP-dI7P_sWO/view?usp=drive_link" },
            { name: "Kur'an Dersi 2", url: "https://drive.google.com/file/d/1djd_lLS8PyqmP-_5hjfkGR2jDm7dbRCp/view?usp=drive_link" },
            { name: "Kur'an Dersi 3", url: "https://drive.google.com/file/d/10YQXMUTkcMyWww5qFm6uKjtoreGaPGwI/view?usp=drive_link" },
            { name: "Kur'an Dersi 4", url: "https://drive.google.com/file/d/1shMgMEn30NPCrEHbgq0UWqZz21KDsmWI/view?usp=drive_link" },
            { name: "Kur'an Dersi 5", url: "https://drive.google.com/file/d/1DToY7jOE2OnyLQKhCs0s2WYLrN6AkTE8/view?usp=drive_link" },
            { name: "Kur'an Dersi 6", url: "https://drive.google.com/file/d/1RgscC_0-riGl4Ocjt46xKljns1MVeAVI/view?usp=drive_link" },
            { name: "Kur'an Dersi 7", url: "https://drive.google.com/file/d/1tT7208haWxluGZClorbA_KEL9q7CJKWC/view?usp=drive_link" },
            { name: "Kur'an Dersi 17", url: "https://drive.google.com/file/d/1IF52k3Yj-2mCdvomJ_Yml7Pe6d8au5Ps/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 1", url: "https://drive.google.com/file/d/1qiy60bnYz22o18KpV7UPotZhPqvNbZ2H/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 2", url: "https://drive.google.com/file/d/19BR6RSEGndxEAoyqiIKeEBRtmv5StuG3/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 3", url: "https://drive.google.com/file/d/1FAwK7eYkDEwJmdDL7aBHCvKxH-cLAMQw/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 4", url: "https://drive.google.com/file/d/1RSqFv2Wy16pmM4p4kxPFw3FYuLvNaJTg/view?usp=drive_link" },
            { name: "Kur'an dersi notlar 5", url: "https://drive.google.com/file/d/18Z8L6uLyV5do0GZaiODcdVSbuBVRiFYw/view?usp=drive_link" }
        ]);

        // SafeStorage
        const SafeStorage = {
            get(key) {
                try {
                    if (!('localStorage' in window)) return null;
                    return window.localStorage.getItem(key);
                } catch (err) {
                    console.warn('localStorage okunamadı:', err);
                    return null;
                }
            },
            set(key, value) {
                try {
                    if (!('localStorage' in window)) return;
                    window.localStorage.setItem(key, value);
                } catch (err) {
                    console.warn('localStorage yazılamadı:', err);
                }
            }
        };

        // Türkçe normalize
        const normalizeText = (() => {
            const trMap = {
                'İ': 'i', 'I': 'ı', 'ı': 'i',
                'ş': 's', 'Ş': 's',
                'ğ': 'g', 'Ğ': 'g',
                'ü': 'u', 'Ü': 'u',
                'ö': 'o', 'Ö': 'o',
                'ç': 'c', 'Ç': 'c'
            };
            return (val) => {
                if (!val) return '';
                return String(val)
                    .replace(/[İIışŞğĞüÜöÖçÇ]/g, c => trMap[c] || c)
                    .toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "");
            };
        })();

        const DateProcessor = {
            parseTimestamp(dateStr, timeStr) {
                try {
                    const normDate = normalizeText(dateStr || '');
                    const normTime = timeStr ? String(timeStr).trim() : "00:00";
                    const dayMatch = normDate.match(/(\d{1,2})/);
                    if (!dayMatch) return 0;
                    const day = parseInt(dayMatch[1], 10);
                    if (!Number.isFinite(day) || day <= 0 || day > 31) return 0;

                    let monthIndex = -1;
                    for (const [key, val] of Object.entries(CONFIG.months)) {
                        if (normDate.includes(key) || normDate.includes(key.substring(0, 3))) {
                            monthIndex = val;
                            break;
                        }
                    }
                    if (monthIndex === -1) return 0;

                    const [hourRaw, minuteRaw] = normTime.split(':');
                    const hour = parseInt(hourRaw || '0', 10) || 0;
                    const minute = parseInt(minuteRaw || '0', 10) || 0;

                    const now = new Date();
                    let year = now.getFullYear();
                    const currentMonth = now.getMonth();

                    if (currentMonth > 8 && monthIndex < 3) year += 1;
                    else if (currentMonth < 3 && monthIndex > 8) year -= 1;

                    const d = new Date(year, monthIndex, day, hour, minute, 0, 0);
                    if (Number.isNaN(d.getTime())) return 0;
                    return d.getTime();
                } catch (e) {
                    console.error('Tarih parse hatası:', e);
                    return 0;
                }
            }
        };

        function safeJSONParse(raw) {
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (err) {
                console.error('JSON parse hatası:', err);
                return null;
            }
        }

        function parseCSV(text) {
            if (!text) return [];
            text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            const rows = [];
            let row = [];
            let cursor = 0;
            let inQuote = false;
            let currentToken = '';

            while (cursor < text.length) {
                const char = text[cursor];
                const nextChar = text[cursor + 1];

                if (inQuote) {
                    if (char === '"') {
                        if (nextChar === '"') {
                            currentToken += '"';
                            cursor++;
                        } else {
                            inQuote = false;
                        }
                    } else {
                        currentToken += char;
                    }
                } else {
                    if (char === '"') {
                        inQuote = true;
                    } else if (char === ',') {
                        row.push(currentToken.trim());
                        currentToken = '';
                    } else if (char === '\n') {
                        row.push(currentToken.trim());
                        rows.push(row);
                        row = [];
                        currentToken = '';
                    } else {
                        currentToken += char;
                    }
                }
                cursor++;
            }

            if (currentToken || row.length) {
                row.push(currentToken.trim());
                rows.push(row);
            }

            return rows.slice(1); // header hariç
        }

        class DataService {
            #schedule = [];

            async fetchWithRetry(url, retries = 2, delay = 1000) {
                for (let i = 0; i <= retries; i++) {
                    try {
                        const controller = new AbortController();
                        const id = setTimeout(() => controller.abort(), 8000);
                        const res = await fetch(url, { signal: controller.signal, cache: "no-store" });
                        clearTimeout(id);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return await res.arrayBuffer();
                    } catch (err) {
                        if (i === retries) throw err;
                        await new Promise(r => setTimeout(r, delay * (i + 1)));
                    }
                }
            }

            async loadData() {
                try {
                    const buffer = await this.fetchWithRetry(CONFIG.csvUrl);
                    const decoder = new TextDecoder('utf-8');
                    const csvText = decoder.decode(buffer);
                    const rows = parseCSV(csvText);

                    const schedule = [];

                    for (const cols of rows) {
                        if (!cols || !cols.length) continue;
                        const clean = (val) => val ? val.replace(/^"|"$/g, '').trim() : '';

                        const week = clean(cols[0]);
                        const date = clean(cols[1]);
                        const day = clean(cols[2]);
                        const time = clean(cols[3]);
                        const subject = clean(cols[4]);
                        const speaker = clean(cols[5]);
                        const link1 = clean(cols[6]);
                        const link2 = clean(cols[7]);

                        if (!subject) continue;

                        const timestamp = DateProcessor.parseTimestamp(date, time);
                        const searchIndex = normalizeText(`${subject} ${speaker} ${date} ${day}`);

                        schedule.push({
                            week,
                            date,
                            day,
                            time,
                            subject,
                            speaker,
                            link1,
                            link2,
                            timestamp,
                            searchIndex
                        });
                    }

                    this.#schedule = schedule;
                    return { success: true, data: this.groupedSchedule };
                } catch (error) {
                    console.error("Data load error:", error);
                    return { error: true };
                }
            }

            bootstrapFromGrouped(grouped) {
                if (!grouped || typeof grouped !== 'object') return;

                const flattened = [];

                for (const [weekKey, items] of Object.entries(grouped)) {
                    if (!Array.isArray(items)) continue;

                    for (const raw of items) {
                        if (!raw || typeof raw !== 'object') continue;
                        const subject = raw.subject || '';
                        if (!subject) continue;

                        const date = raw.date || '';
                        const day = raw.day || '';
                        const time = raw.time || '';
                        const speaker = raw.speaker || '';
                        const link1 = raw.link1 || '';
                        const link2 = raw.link2 || '';

                        const timestamp = (typeof raw.timestamp === 'number' && !Number.isNaN(raw.timestamp))
                            ? raw.timestamp
                            : DateProcessor.parseTimestamp(date, time);

                        const searchIndex = raw.searchIndex
                            ? raw.searchIndex
                            : normalizeText(`${subject} ${speaker} ${date} ${day}`);

                        flattened.push({
                            week: raw.week || weekKey,
                            date,
                            day,
                            time,
                            subject,
                            speaker,
                            link1,
                            link2,
                            timestamp,
                            searchIndex
                        });
                    }
                }

                if (flattened.length) {
                    this.#schedule = flattened;
                }
            }

            get groupedSchedule() {
                return this.#schedule.reduce((acc, item) => {
                    const key = item.week || '';
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(item);
                    return acc;
                }, {});
            }

            get resources() {
                return EXTRA_RESOURCES;
            }

            get hasData() {
                return this.#schedule.length > 0;
            }

            search(query) {
                if (!query) return [];
                const normalizedQuery = normalizeText(query);
                if (!normalizedQuery) return [];
                return this.#schedule.filter(item => item.searchIndex.includes(normalizedQuery));
            }
        }

        class Renderer {
            #container;
            #templates;

            constructor() {
                this.#container = document.getElementById('main-content');
                this.#templates = {
                    week: document.getElementById('tpl-week-section'),
                    card: document.getElementById('tpl-card'),
                    btn: document.getElementById('tpl-button'),
                    empty: document.getElementById('tpl-empty'),
                    menuItem: document.getElementById('tpl-menu-item')
                };
            }

            #clone(id) {
                const tpl = this.#templates[id];
                if (!tpl) {
                    throw new Error(`Template bulunamadı: ${id}`);
                }
                return tpl.content.cloneNode(true);
            }

            #createCard(item, showWeekBadge = false) {
                const node = this.#clone('card');
                const { subject, speaker, time, date, day, week, link1, link2, timestamp } = item;
                const toleranceMs = CONFIG.joinToleranceMinutes * 60 * 1000;

                node.querySelector('[data-slot="date-day"]').textContent = `${date}, ${day}`;
                node.querySelector('[data-slot="subject"]').textContent = subject;
                node.querySelector('[data-slot="speaker"]').textContent = speaker || 'Belirtilmedi';
                node.querySelector('[data-slot="time"]').textContent = time;

                const joinBtn = node.querySelector('[data-slot="join-btn"]');
                if (joinBtn) {
                    if (timestamp > 0 && Date.now() > (timestamp + toleranceMs)) {
                        joinBtn.remove();
                    }
                }

                if (showWeekBadge) {
                    const badge = node.querySelector('[data-slot="week-badge"]');
                    badge.textContent = week;
                    badge.classList.remove('hidden');
                }

                const actionsContainer = node.querySelector('[data-slot="actions"]');
                if (!link1 && !link2) {
                    const span = document.createElement('span');
                    span.className = 'text-xs text-gray-400 italic';
                    span.textContent = 'Kayıt bulunmuyor';
                    actionsContainer.appendChild(span);
                } else {
                    if (link1) actionsContainer.appendChild(this.#createButton(link1, 'Ders Notu', 'fa-file-lines', 'primary'));
                    if (link2) actionsContainer.appendChild(this.#createButton(link2, 'Tilavet', 'fa-book-quran', 'secondary'));
                }
                return node;
            }

            #createButton(url, text, iconClass, type) {
                const node = this.#clone('btn');
                const a = node.querySelector('a');
                a.href = url;
                a.classList.add(...(type === 'primary' ? CONFIG.classes.btnPrimary : CONFIG.classes.btnSecondary));
                node.querySelector('i').classList.add('fa-solid', iconClass);
                node.querySelector('span').textContent = text;
                return node;
            }

            showLoading() {
                if (!this.#container) return;
                this.#container.innerHTML = `
                    <div class="text-center mt-10 text-emerald-600 dark:text-emerald-400 fade-in">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
                        <p>Ders programı yükleniyor...</p>
                    </div>`;
            }

            showError() {
                if (!this.#container) return;
                this.#container.innerHTML = `
                    <div class="text-center mt-10 text-red-500 fade-in">
                        <i class="fa-solid fa-triangle-exclamation text-3xl mb-3"></i>
                        <p>Veri yüklenemedi. Bağlantınızı kontrol edin.</p>
                        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded text-sm font-bold">Tekrar Dene</button>
                    </div>`;
            }

            renderSchedule(groupedData) {
                if (!this.#container) return;
                requestAnimationFrame(() => {
                    this.#container.innerHTML = '';
                    const weeks = Object.keys(groupedData).reverse();

                    if (weeks.length === 0) {
                        this.#container.appendChild(this.#clone('empty'));
                        return;
                    }

                    const fragment = document.createDocumentFragment();

                    weeks.forEach((week, index) => {
                        const section = this.#clone('week');
                        const sectionEl = section.querySelector('section');
                        const header = sectionEl.querySelector('.week-header');
                        const content = sectionEl.querySelector('.week-content');
                        const icon = header.querySelector('[data-slot="toggle-icon"]');

                        section.querySelector('[data-slot="week-title"]').textContent = week;
                        groupedData[week].forEach(item => content.appendChild(this.#createCard(item)));

                        if (index === 0) {
                            content.classList.remove(CONFIG.classes.hidden);
                            icon.classList.add(CONFIG.classes.rotate);
                            header.setAttribute('aria-expanded', 'true');
                        }

                        header.addEventListener('click', () => {
                            const isHidden = content.classList.contains(CONFIG.classes.hidden);
                            content.classList.toggle(CONFIG.classes.hidden);
                            icon.classList.toggle(CONFIG.classes.rotate);
                            header.setAttribute('aria-expanded', String(isHidden));
                        });

                        fragment.appendChild(section);
                    });

                    this.#container.appendChild(fragment);
                });
            }

            renderFiltered(list) {
                if (!this.#container) return;
                requestAnimationFrame(() => {
                    this.#container.innerHTML = '';
                    if (!list || !list.length) {
                        this.#container.appendChild(this.#clone('empty'));
                        return;
                    }
                    const sortedList = list.slice().sort((a, b) => b.timestamp - a.timestamp);
                    const fragment = document.createDocumentFragment();
                    const wrapper = document.createElement('div');
                    wrapper.className = 'p-2 fade-in';
                    sortedList.forEach(item => wrapper.appendChild(this.#createCard(item, true)));
                    fragment.appendChild(wrapper);
                    this.#container.appendChild(fragment);
                });
            }

            renderMenu(items) {
                const menu = document.getElementById('menu-quran');
                if (!menu) return;
                menu.innerHTML = '';
                const fragment = document.createDocumentFragment();
                (items || []).forEach(note => {
                    const node = this.#clone('menuItem');
                    const a = node.querySelector('a');
                    a.href = note.url;
                    node.querySelector('[data-slot="text"]').textContent = note.name;
                    const isAudio = note.name.toLowerCase().includes("dersi") && !note.name.toLowerCase().includes("not");
                    node.querySelector('[data-slot="icon"]').classList.add(isAudio ? "fa-file-audio" : "fa-file-lines");
                    fragment.appendChild(node);
                });
                menu.appendChild(fragment);
            }
        }

        class ThemeManager {
            constructor() {
                this.html = document.documentElement;
                this.btn = document.getElementById('btn-theme-toggle');
                this.icon = this.btn ? this.btn.querySelector('i') : null;
                if (this.btn && this.icon) {
                    this.init();
                }
            }
            init() {
                let local = SafeStorage.get('theme');
                const sys = window.matchMedia &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = local === 'dark' || (!local && sys);
                this.apply(isDark);
                this.btn.addEventListener('click', () => {
                    this.apply(!this.html.classList.contains('dark'));
                });
            }
            apply(isDark) {
                this.html.classList.toggle('dark', isDark);
                SafeStorage.set('theme', isDark ? 'dark' : 'light');
                if (this.icon) {
                    this.icon.className = isDark
                        ? 'fa-solid fa-sun text-white text-xs pointer-events-none'
                        : 'fa-solid fa-moon text-white text-xs pointer-events-none';
                }
            }
        }

        class App {
            #dataService;
            #renderer;
            #themeManager;
            #searchTimer = null;
            #currentGrouped = null;

            constructor() {
                this.#dataService = new DataService();
                this.#renderer = new Renderer();
                this.#themeManager = new ThemeManager();
            }

            #readFromCache() {
                const raw = SafeStorage.get(CONFIG.cacheKey);
                const parsed = safeJSONParse(raw);
                if (!parsed || typeof parsed !== 'object') return null;

                const data = parsed.data && parsed.version ? parsed.data : parsed;
                if (!data || typeof data !== 'object') return null;
                if (!Object.keys(data).length) return null;

                return data;
            }

            #writeToCache(grouped) {
                const payload = {
                    version: CONFIG.cacheVersion,
                    data: grouped
                };
                SafeStorage.set(CONFIG.cacheKey, JSON.stringify(payload));
            }

            async init() {
                this.#renderer.renderMenu(this.#dataService.resources);
                this.#setupDropdown();
                this.#bindSearch();

                const cachedGrouped = this.#readFromCache();
                if (cachedGrouped) {
                    this.#dataService.bootstrapFromGrouped(cachedGrouped);
                    this.#currentGrouped = this.#dataService.groupedSchedule;
                    this.#renderer.renderSchedule(this.#currentGrouped);
                } else {
                    this.#renderer.showLoading();
                }

                const result = await this.#dataService.loadData();

                if (result && result.success && this.#dataService.hasData) {
                    const freshGrouped = this.#dataService.groupedSchedule;
                    this.#currentGrouped = freshGrouped;
                    this.#renderer.renderSchedule(freshGrouped);
                    this.#writeToCache(freshGrouped);
                } else if (!cachedGrouped) {
                    this.#renderer.showError();
                }
            }

            #bindSearch() {
                const input = document.getElementById('input-search');
                if (!input || input.dataset.bound === 'true') return;
                input.dataset.bound = 'true';

                input.addEventListener('input', (e) => {
                    const query = e.target.value.trim();
                    clearTimeout(this.#searchTimer);

                    this.#searchTimer = window.setTimeout(() => {
                        if (!query) {
                            this.#renderer.renderSchedule(
                                this.#currentGrouped || this.#dataService.groupedSchedule
                            );
                            return;
                        }
                        const results = this.#dataService.search(query);
                        this.#renderer.renderFiltered(results);
                    }, CONFIG.searchDebounce);
                });
            }

            #setupDropdown() {
                const btn = document.getElementById('btn-quran-menu');
                const menu = document.getElementById('menu-quran');
                if (!btn || !menu || btn.dataset.bound === 'true') return;
                btn.dataset.bound = 'true';

                const icon = btn.querySelector('.fa-chevron-down');
                let isOpen = false;

                const openMenu = () => {
                    if (isOpen) return;
                    isOpen = true;
                    menu.classList.remove(CONFIG.classes.hidden);
                    requestAnimationFrame(() => {
                        menu.classList.remove(...CONFIG.classes.menuOut);
                        menu.classList.add(...CONFIG.classes.menuIn);
                        if (icon) icon.classList.add(CONFIG.classes.rotate);
                    });
                    btn.setAttribute('aria-expanded', 'true');
                };

                const closeMenu = () => {
                    if (!isOpen) return;
                    isOpen = false;
                    menu.classList.remove(...CONFIG.classes.menuIn);
                    menu.classList.add(...CONFIG.classes.menuOut);
                    if (icon) icon.classList.remove(CONFIG.classes.rotate);
                    btn.setAttribute('aria-expanded', 'false');
                    setTimeout(() => {
                        if (!isOpen) {
                            menu.classList.add(CONFIG.classes.hidden);
                        }
                    }, 200);
                };

                const toggleMenu = () => {
                    if (isOpen) closeMenu();
                    else openMenu();
                };

                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMenu();
                });

                document.addEventListener('click', (e) => {
                    if (!isOpen) return;
                    if (!btn.contains(e.target) && !menu.contains(e.target)) {
                        closeMenu();
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new App().init();
        });
    })();
    </script>
</body>
</html>
